<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Zmiana adresu email</title>
    <style>
        body {
            background-color: #12140E;
            color: #E2E3D8;
            font-family: Roboto, Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        .container {
            background-color: #1E201A;
            border-radius: 16px;
            margin: 40px auto 0 auto;
            box-shadow: 0 2px 8px #44483D;
            width: 600px;
            padding: 32px;
        }

        .header {
            color: #B1D18A;
            font-size: 2em;
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 16px;
            display: block;
        }

        .paragraph {
            font-size: 16px;
            margin-bottom: 16px;
            display: block;
        }

        .code {
            color: #A0D0CB;
            background: #282B24;
            font-size: 1.5em;
            font-weight: bold;
            padding: 12px 24px;
            border-radius: 8px;
            letter-spacing: 2px;
            display: inline-block;
            margin-bottom: 16px;
        }

        .signature {
            color: #BFCBAD;
            font-size: 16px;
            display: block;
            margin-top: 24px;
        }

        .footer {
            color: #8F9285;
            font-size: 12px;
            margin-top: 24px;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="container">
    <span class="header">Zmiana adresu email</span>
    <span class="paragraph">Cześć, [username]!</span>
    <span class="paragraph">
       Twój email został pomyślnie zmieniony.
    </span>
    <span class="paragraph">
        Jeśli nie prosiłeś (-aś) o kod, zignoruj tę wiadomość lub skontaktuj się z naszym wsparciem: <a
            href="mailto:[support_email]">[support_email]</a>.
    </span>
    <span class="signature">
        Pozdrawiamy,<br>
        Zespół Magma Quiz
    </span>
</div>
<div class="footer">
    &copy; 2026 Projekt Magma.
</div>
</body>
</html>
